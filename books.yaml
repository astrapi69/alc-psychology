# books.yaml — recommended reading per domain.
#
# Optional companion to the lesson catalogue: maps a content domain to a list
# of books the app can surface as further reading. Not a content set, so it is
# not processed by scripts/validate_content.py.
domains:
  psychology:
    books:
      - title: "Psychologie"
        author: "Philip Zimbardo, Robert Johnson, Vivian McCann"
        isbn: "978-3868943238"
        url: "https://www.amazon.de/dp/3868943234/"
        language: "de"
        description: "Das Standardwerk für Psychologie-Einsteiger."
        tags: ["psychologie", "lehrbuch", "grundlagen"]
      - title: "Die Psychologie des Überzeugens"
        author: "Robert B. Cialdini"
        isbn: "978-3456860350"
        url: "https://www.hogrefe.com/de/shop/die-psychologie-des-ueberzeugens-91960.html"
        language: "de"
        description: "Der Klassiker zu den Prinzipien der Beeinflussung — Begleitbuch zum Set „Psychologie der Beeinflussung“."
        tags: ["psychologie", "beeinflussung", "sozialpsychologie"]
