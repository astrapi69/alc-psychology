# Wurzel-Manifest von alc-psychology — die Psychologie-Reihe.
#
# Adaptive-Learner-Content-Repo für Psychologie. Zwei deutschsprachige
# Sets (domain: psychology) bilden eine aufeinander aufbauende Reihe:
#
#   psych-intro          Psychologie — Grundlagen        (A1, 112 Lektionen)
#   psych-beeinflussung  Psychologie der Beeinflussung   (A2, 8 Lektionen)
#
# Vormals in astrapi69/adaptive-learner-content; in dieses eigenständige
# Content-Repo ausgelagert (siehe adaptive-learner-content#144). Die
# Inception-Effekt-Beispiellektion aus adaptive-learner-content-test ist
# inhaltsgleich als Lektion 106 des psych-intro-Sets enthalten.
# Validieren mit:
#
#     python3 scripts/validate_content.py
#     node scripts/validate_with_engine.mjs .
#
# Anleitung: docs/GETTING-STARTED.md
schema_version: '1.5'
name: Adaptive Learner — Psychologie
description: >-
  Psychologie-Inhalte für Adaptive Learner: ein Einführungskurs auf
  Universitätsniveau (112 Lektionen) und ein Aufbau-Set zur
  Psychologie der Beeinflussung, beide auf Deutsch erklärt.
sets:
  - id: psych-intro-from-de
    title: Psychologie — Grundlagen
    title_native: Psychologia — Fundamenta
    target_language: de
    source_language: de
    domain: psychology
    level: A1
    path: sets/de/psych-intro
    version: '1.19.0'
    lesson_count: 112
    description: >-
      Einführungskurs Psychologie auf Universitätsniveau für
      Deutschsprachige (106 Lektionen): Grundbegriffe und
      Geschichte, die Grundlagenfächer (Wahrnehmung, Gedächtnis,
      Lernen, Motivation/Emotion, Entwicklung, Sozial-,
      Persönlichkeits- und biologische Psychologie), klinische und
      positive Psychologie, Intelligenz, Stress, Bewusstsein und
      Schlaf, die Psychotherapieverfahren, Forschungsmethoden und
      Statistik, die angewandten Felder (pädagogische,
      Arbeits-/Organisations-, Gesundheitspsychologie,
      Diagnostik), vertiefte Grundlagenfächer, Geschichte und
      Paradigmen, Wissenschaftstheorie und Forschungsethik sowie
      vertiefende Blöcke zur Neuropsychologie, zur Arbeits- und
      Organisationspsychologie (mit Arbeitsstress und Burnout) und
      zur Pädagogischen Psychologie. Erklärt auf Deutsch, mit
      englischen Originalbegriffen in Klammern. Erstes
      Nicht-Sprachen-Set (domain: psychology).
    tags:
      - beginner
      - psychology
      - science
    book:
      title: "Psychologie"
      author: "Philip Zimbardo, Robert Johnson, Vivian McCann"
      isbn: "978-3868943238"
      url: "https://www.amazon.de/dp/3868943234/"
  - id: psych-beeinflussung-from-de
    title: Psychologie der Beeinflussung
    title_native: Psychologie der Beeinflussung
    target_language: de
    source_language: de
    domain: psychology
    level: A2
    path: sets/de/psych-beeinflussung
    version: '1.0.0'
    lesson_count: 8
    description: >-
      Aufbau-Set zur Psychologie der Beeinflussung (8 Lektionen),
      auf Deutsch erklärt, im thematischen Anschluss an die
      Inception-Effekt-Lektion: Priming (mit Replikationskrise),
      Framing-Effekt, Ankereffekt, kognitive Dissonanz,
      Reziprozität, soziale Bewährtheit und Foot-in-the-door, mit
      abschließender Wiederholung. Effekte werden als empirisch
      belegte Tendenzen dargestellt, nicht als garantierte
      Manipulations-Hebel; die genannten Studien sind real und
      korrekt zugeordnet. Nutzt die Aufgabentypen free_text, cloze
      (type und select), matching und word_tiles.
    tags:
      - intermediate
      - psychology
      - influence
      - science
    book:
      title: "Die Psychologie des Überzeugens"
      author: "Robert B. Cialdini"
      isbn: "978-3456860350"
      url: "https://www.hogrefe.com/de/shop/die-psychologie-des-ueberzeugens-91960.html"
