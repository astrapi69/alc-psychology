# media.yaml — curated free supplementary media per domain (EXP-029).
#
# Optional companion to the lesson catalogue and to books.yaml: maps a
# content domain to a list of free, openly accessible media (videos,
# podcasts, articles) the app can surface as further study material.
#
# Like books.yaml, this file is NOT a content set and is not processed by
# scripts/validate_content.py for the lesson schema. It only has to be
# valid YAML.
#
# Curation rules (EXP-029):
#   - Free media only (paid material belongs in books.yaml).
#   - No affiliate links, no tracking parameters.
#   - No paywalled courses.
#   - Every url is a real, working http/https link (validated).
#   - language: de or en (the language of the resource).
#   - level: beginner | intermediate | advanced, where meaningful.
#   - type: youtube | podcast | article | book.
#         ``book`` surfaces the companion book of a set as the first
#         "further study" item; the canonical book record still lives
#         in books.yaml.
#   - set: optional set id an entry is tied to (e.g. ``psych-intro``).
#   - priority: lower sorts first. The companion ``book`` of a set uses
#         ``priority: 0`` so it appears before all videos and links;
#         every other entry defaults to ``priority: 10``.

psychology:
  - title: "Intro to Psychology — Crash Course Psychology #1"
    type: youtube
    url: "https://www.youtube.com/watch?v=vo4pMVb0R6M"
    language: en
    duration: "10min"
    level: beginner
    description: >-
      Hank Green opens the 40-part Crash Course Psychology series with
      the question of what psychology actually studies.
  - title: "Crash Course Psychology (full series)"
    type: youtube
    url: "https://www.youtube.com/playlist?list=PL8dPuuaLjXtOPRKzVLY0jJY-uHOH9KVU6"
    language: en
    level: beginner
    description: >-
      All 40 episodes, from the brain and perception through memory,
      development, personality and disorders.
  - title: "Psychology (Wikipedia)"
    type: article
    url: "https://en.wikipedia.org/wiki/Psychology"
    language: en
    description: >-
      A comprehensive overview of the discipline, its subfields and
      research methods.
  - title: "Psychologie (Wikipedia)"
    type: article
    url: "https://de.wikipedia.org/wiki/Psychologie"
    language: de
    level: beginner
    description: >-
      Deutschsprachiger Einstieg in die Psychologie — ergänzt das
      Psychologie-Set (sets/de/psych-intro).
