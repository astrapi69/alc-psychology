# Psychologie — Grundlagen (für Deutschsprachige) — Set-Manifest
# (Phase 60 / v1.44.0).
#
# Erstes Nicht-Sprachen-Set von Adaptive Learner. ``domain:
# psychology`` markiert den Inhalt als Sachthema: Material und
# Erklärung sind beide auf Deutsch (source_language ==
# target_language), und der Set-Ordner trägt einen Themennamen
# (``psych-intro``) statt eines ``{target}-{level}``-Namens. Der
# Content-Loader liest ``metadata.lessons`` für die Dateiliste.
#
# v1.1.0 (schema v1.3): erweitert um fünf vertiefende Lektionen
# (11–15) zu Intelligenz, Stress, biologischen Grundlagen,
# Bewusstsein/Schlaf und einer Wiederholung. Die neuen Karten
# nutzen die optionalen v1.3-Felder difficulty, tags und
# media_type ("text").
#
# v1.2.0 (schema v1.3): erweitert um eine fünfteilige
# Psychotherapie-Reihe (16–20): Grundlagen, Verhaltenstherapie,
# kognitive Verhaltenstherapie, psychodynamische und humanistische
# Verfahren sowie eine abschließende Wiederholung dieser Reihe.
# Lektion 15 bleibt als Zwischen-Wiederholung erhalten.
#
# v1.3.0 (schema v1.3): erweitert um eine fünfteilige Reihe zu
# Forschungsmethoden und Statistik (21–25): wissenschaftliche
# Vorgehensweise, Experiment und Korrelation, Datenerhebung und
# Gütekriterien, deskriptive Statistik sowie Inferenzstatistik
# mit abschließender Wiederholung dieser Reihe.
#
# v1.4.0 (schema v1.3): zum vollständigen Einführungskurs auf
# Universitätsniveau ausgebaut (40 Lektionen). Neu: angewandte
# Felder (26–30: Pädagogische, Arbeits-/Organisations-,
# Gesundheitspsychologie, Diagnostik) sowie vertiefte
# Grundlagenfächer (31–39: Emotionstheorien, Kognition,
# Sozial-, Entwicklungs- und Persönlichkeitspsychologie,
# Biopsychologie, Geschichte/Paradigmen, Wissenschaftstheorie
# und Forschungsethik), abgeschlossen durch zwei Wiederholungen
# (35) und ein Gesamt-Capstone (40).
#
# v1.5.0 (schema v1.3): erweitert um einen vertiefenden
# Spezialgebiete-Block (41–45): Wahrnehmung/Psychophysik,
# Neuropsychologie und bildgebende Verfahren, vertiefte klinische
# Psychologie (ICD-11/DSM-5), weiterführende Statistik und
# Forschungsdesigns sowie eine abschließende Wiederholung dieser
# Reihe.
#
# v1.6.0 (schema v1.3): 50-Lektionen-Meilenstein. Block 46–50:
# Gedächtnis und Lernen vertieft, Sprachpsychologie, das visuelle
# und auditive System, evolutionäre und Kulturpsychologie sowie
# eine abschließende Wiederholung.
#
# v1.7.0 (schema v1.3): Block 51–55 zur Entscheidungspsychologie:
# Heuristiken und Urteilsfehler, Dual-Process-Theorien (System 1
# und 2), Prospect Theory, Verhaltensökonomie und Nudging sowie
# eine abschließende Wiederholung.
#
# v1.8.0 (schema v1.3): Block 56–60 zu Motivation, Emotion und
# Wohlbefinden: Motivationstheorien, Emotionsregulation,
# Selbstregulation und Gewohnheiten, vertiefte positive
# Psychologie sowie eine abschließende Wiederholung.
#
# v1.9.0 (schema v1.3): Block 61–65 zu Bewusstsein, Substanzen
# und Gehirn: Schlaf vertieft, veränderte Bewusstseinszustände,
# Psychopharmakologie, Sucht und Abhängigkeit sowie eine
# abschließende Wiederholung.
#
# v1.10.0 (schema v1.3): Block 66–70 zur vertieften
# Sozialpsychologie: Einstellungsänderung und Persuasion,
# Gruppenprozesse, Aggression und prosoziales Verhalten,
# Intergruppenbeziehungen und Vorurteile sowie eine abschließende
# Wiederholung.
#
# v1.11.0 (schema v1.3): Block 71–75 zur Entwicklung über die
# Lebensspanne: pränatale Entwicklung und frühe Kindheit, Kindheit
# und Jugend, Erwachsenenalter, Alter und Gerontopsychologie sowie
# eine abschließende Wiederholung.
#
# v1.12.0 (schema v1.3): Block 76–80 zur klinischen Psychologie II
# (sensible Themen, behandelt mit Hinweis auf professionelle Hilfe
# und deutschen Anlaufstellen, ohne Selbstdiagnose-Checklisten):
# Trauma und PTBS, Essstörungen, Suizidprävention und
# Krisenintervention, Zwangs- und Angststörungen sowie eine
# abschließende Wiederholung.
#
# v1.13.0 (schema v1.3): Block 81–85 zur forensischen und
# Rechtspsychologie (sachlich, wissenschaftlich, ohne
# True-Crime-Sensationalismus): Aussagepsychologie und Augenzeugen,
# Glaubhaftigkeitsbegutachtung, Schuldfähigkeit (§ 20/§ 21 StGB),
# Täterprofile und Kriminalprognose sowie eine abschließende
# Wiederholung.
#
# v1.14.0 (schema v1.3): Block 86–90 zur Intelligenz:
# Intelligenzmodelle (g-Faktor, CHC, Gardner, Sternberg),
# Intelligenzmessung und Testgütekriterien, Erblichkeit, Umwelt
# und der Flynn-Effekt (mit ehrlichem, wissenschaftlichem Umgang
# mit IQ-Kontroversen), Hochbegabung und Lernstörungen sowie eine
# abschließende Wiederholung.
#
# v1.15.0 (schema v1.3): Block 91–95 zur Neuropsychologie:
# Grundlagen (Läsionsmethode, Bildgebung, doppelte Dissoziation,
# Lokalisation vs. Plastizität), funktionelle Neuroanatomie und
# Lateralisierung, neuropsychologische Störungsbilder (Aphasie,
# Apraxie, Agnosie, Neglect), Gedächtnis- und Exekutivstörungen
# samt Diagnostik/Rehabilitation sowie eine Wiederholung.
#
# v1.16.0 (schema v1.3): Block 96–100 zur Arbeits- und
# Organisationspsychologie: Grundlagen und Teildisziplinen,
# Arbeitsmotivation und Arbeitszufriedenheit, Führung und
# Teamarbeit, Arbeitsstress und Burnout (sachlich, mit Hinweis,
# dass die Lektion keine professionelle Beratung ersetzt) sowie
# eine Wiederholung.
#
# v1.17.0 (schema v1.3): Block 101–105 zur Pädagogischen
# Psychologie: Grundlagen und Angebots-Nutzungs-Modell,
# Lernmotivation und selbstreguliertes Lernen, Instruktion und
# Unterrichtsqualität, Leistungsbeurteilung und Prüfungsangst
# sowie eine abschließende Wiederholung (rezeptive Richtung).
#
# v1.18.0 (schema v1.3): Einzellektion 106 zur
# Kommunikationspsychologie — der Inception-Effekt (induzierte
# Eigendynamik): die Mechanismen sokratische Gesprächsführung,
# Priming/Framing und Fehlattribuierung der Quelle, sachlich und
# mit Beispielen.
#
# v1.19.0 (schema v1.3): Block 107–112 mit spezialisierten,
# vertiefenden Einzellektionen zu Grundlagenfächern: das soziale
# Selbst (Selbstwahrnehmungstheorie nach Bem, selbstwertdienliche
# Verzerrung, Akteur-Beobachter-Asymmetrie, Spotlight-, Falscher-
# Konsens- und Dunning-Kruger-Effekt), die klassische
# Bindungsforschung (Harlow und der Kontaktkomfort, Lorenz und die
# Prägung, kritische/sensible Phasen), Bindung über die
# Lebensspanne (innere Arbeitsmodelle, Erwachsenenbindung nach
# Hazan & Shaver, intergenerationale Weitergabe), synaptische
# Plastizität (Hebbsche Regel, Langzeitpotenzierung/LTP, NMDA-
# Rezeptor), neuronale Strukturen jenseits des Neurons
# (Gliazellen, Spiegelneurone, adulte Neurogenese) sowie
# abrufbasiertes Lernen (Testing-Effekt und wünschenswerte
# Erschwernisse nach Bjork). Inhaltlich abgegrenzt gegen die
# bestehenden Lektionen 6/34/71/73 (Bindung), 13/37 (Biologie)
# und 3/46 (Gedächtnis).
schema_version: '1.3'
name: Psychologie — Grundlagen
description: >-
  Einführungskurs Psychologie auf Universitätsniveau für
  Deutschsprachige (40 Lektionen): von Grundbegriffen,
  Geschichte und den Grundlagenfächern (Wahrnehmung, Gedächtnis,
  Lernen, Motivation/Emotion, Entwicklung, Sozial-,
  Persönlichkeits- und biologischer Psychologie) über die
  klinische und positive Psychologie, Intelligenz, Stress,
  Bewusstsein und Schlaf bis zu den Psychotherapieverfahren,
  den Forschungsmethoden und der Statistik, den angewandten
  Feldern (pädagogische, Arbeits-/Organisations-,
  Gesundheitspsychologie, Diagnostik), vertieften
  Grundlagenfächern, der Geschichte und den Paradigmen sowie der
  Wissenschaftstheorie und Forschungsethik. Karten, Definitionen
  und Theorie auf Deutsch, mit den englischen Originalbegriffen
  in Klammern.
sets:
  - id: psych-intro-from-de
    title: Psychologie — Grundlagen
    title_native: Psychologia — Fundamenta
    target_language: de
    source_language: de
    domain: psychology
    level: A1
    path: sets/de/psych-intro
    version: '1.19.0'
    lesson_count: 112
    domain_label: Psychologie
    description: >-
      Vollständiger Einführungskurs Psychologie auf
      Universitätsniveau (90 Lektionen), auf Deutsch erklärt — von
      den Grundlagen- und Anwendungsfächern über Psychotherapie,
      Forschungsmethoden und Statistik bis zu vertieften
      Grundlagenfächern, Geschichte, Wissenschaftstheorie, einem
      Spezialgebiete-Block (Psychophysik, Neuropsychologie,
      klinische Vertiefung, weiterführende Statistik), einem Block
      zu Gedächtnis, Sprache, Sinnessystemen, Evolution und Kultur,
      der Entscheidungspsychologie (Heuristiken, Dual-Process,
      Prospect Theory, Verhaltensökonomie), einem Block zu
      Motivation, Emotion und Wohlbefinden sowie einem Block zu
      Bewusstsein, Substanzen und Gehirn (Schlaf, veränderte
      Zustände, Psychopharmakologie, Sucht) sowie der vertieften
      Sozialpsychologie (Persuasion, Gruppenprozesse, Aggression
      und Prosozialität, Vorurteile und Intergruppenbeziehungen)
      sowie der Entwicklung über die Lebensspanne (von der
      pränatalen Phase bis ins hohe Alter) und einer Vertiefung
      der klinischen Psychologie (Trauma, Essstörungen,
      Suizidprävention, Zwangs- und Angststörungen — mit Hinweis
      auf professionelle Hilfe und Anlaufstellen) sowie der
      forensischen und Rechtspsychologie (Aussagepsychologie,
      Glaubhaftigkeitsbegutachtung, Schuldfähigkeit, Täterprofile
      und Kriminalprognose — sachlich und ohne Sensationalismus)
      sowie der Neuropsychologie (Grundlagen und Methoden,
      funktionelle Neuroanatomie, Störungsbilder, Gedächtnis- und
      Exekutivstörungen), der Arbeits- und Organisationspsychologie
      (Motivation und Zufriedenheit, Führung und Teams,
      Arbeitsstress und Burnout — mit Hinweis auf professionelle
      Hilfe) und der Pädagogischen Psychologie (Lernmotivation,
      Unterrichtsqualität, Leistungsbeurteilung und Prüfungsangst).
    tags:
      - beginner
