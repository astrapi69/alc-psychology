# Psychologie der Beeinflussung (für Deutschsprachige) — Set-Manifest.
#
# Aufbauendes Nicht-Sprachen-Set (``domain: psychology``) im
# thematischen Anschluss an die Inception-Effekt-Lektion des
# psych-intro-Sets (Lektion 106). Material und Erklärung sind beide
# auf Deutsch (source_language == target_language); der Set-Ordner
# trägt einen Themennamen (``psych-beeinflussung``) statt eines
# ``{target}-{level}``-Namens. Der Content-Loader liest
# ``metadata.lessons`` für die Dateiliste.
#
# v1.0.0 (schema v1.4): acht Lektionen zu den zentralen
# Beeinflussungs- und Verzerrungseffekten — Priming (mit
# Replikationskrise), Framing, Ankereffekt, kognitive Dissonanz,
# Reziprozität, soziale Bewährtheit und Foot-in-the-door — plus eine
# zusammenfassende Wiederholung. Genutzte Aufgabentypen: free_text,
# cloze (type und select), matching und word_tiles, jeweils mit
# einem Theorie-Schritt pro Lektion. picture_choice wird bewusst
# weggelassen, da das Thema abstrakt ist und keine sinnvollen,
# real vorhandenen Bilder bietet.
schema_version: '1.4'
name: Psychologie der Beeinflussung
description: >-
  Ein deutsches Aufbau-Set zur Psychologie der Beeinflussung im
  Anschluss an die Inception-Effekt-Lektion: Priming (mit
  Replikationskrise), Framing-Effekt, Ankereffekt, kognitive
  Dissonanz, Reziprozität, soziale Bewährtheit und
  Foot-in-the-door. Fachlich mit Augenmaß erklärt — Effekte als
  empirisch belegte Tendenzen, nicht als garantierte Manipulations-
  Hebel; genannte Studien sind real und korrekt zugeordnet.
sets:
